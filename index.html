<!DOCTYPE HTML>
<html>
     	<head>
        	<ul>
			</ul>
			<link rel="icon" type="image/x-icon" href="images/favicon.ico">
			<link rel="stylesheet" href="Styles.css">
        	<meta charset="utf-8">
		</head>
     	<meta name="viewport" content="width=device-width, initial-scale=1">
		

	</head>
	
	<title>Jam Shred</title>

	<p id="demo"></p>
	
	

	<div class="bigContainer left">
	
	<div id="title">
		<img src="./images/Shine.png">
		<span id="track"></span>
	</div>

	

  	<div class="rectangle" id="waveform">
		<img src="./images/DisplayShine.png">
	</div>

	<div class="timeContainer">
		<img src="./images/Shine.png">
		<div id="timer">0:00/</div>
		<div id="duration">0:00</div>
		
		
	</div>

	<div class="buttonContainer">
		<span class="tooltip-text">I'm a tooltip!</span>
		
		<div class="btnBack" id="playBtnBack">
			<img src="./images/CoolButton_Click.png" width="100" height="40">
			<div class="btn" id="playBtn">
				<img src="./images/Button_Play.png" width="100" height="40" title="Play">	
				
			</div>
		</div>
		
		
		<div class="btnBack" id="playBtnBack">
			<img src="./images/CoolButton_Click.png" width="100" height="40">
			<div class="btn" id="pauseBtn">
				<img src="./images/Button_Pause.png" width="100" height="40" title="Pause">	
			</div>
		</div>
		<div class="btnBack" id="playBtnBack">
			<img src="./images/CoolButton_Click.png" width="100" height="40">
			<div class="btn" id="prevBtn">
				<img src="./images/Button_Prev.png" width="100" height="40" title="Previous Song">	
			</div>
		</div>
		<div class="btnBack" id="playBtnBack">
			<img src="./images/CoolButton_Click.png" width="100" height="40">
			<div class="btn" id="nextBtn">
				<img src="./images/Button_Next.png" width="100" height="40" title="Next Song">	
			</div>
		</div>

		<div class="btn" id="playlistBtn"></div>
		<div class="btn" id="volumeBtn"></div>
	

		

	</div>

	

	<div id="progressBack">
		
		<div id="progress"></div>
		<img src="./images/Shine.png">
	</div>

	<div id="loading"></div>

     
	
</div>

<div class="bigContainer right">
<div id="playlist">
	<img src="./images/Shine.png" title="Click on a song to select it!">
	
	<div id="list"></div>

	<script src="./siriwave.js"></script>
	<script src="./howler.js/src/howler.core.js"></script>
	<script src="./howlplayer.js"></script>
</html>
